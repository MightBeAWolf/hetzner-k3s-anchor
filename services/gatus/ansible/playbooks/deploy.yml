---
# Deploy Gatus status monitoring
# Run with: mise run //services/gatus:deploy

- name: Deploy Gatus
  hosts: k3s_nodes
  run_once: true
  become: true

  module_defaults:
    kubernetes.core.helm:
      kubeconfig: /etc/rancher/k3s/k3s.yaml
    kubernetes.core.k8s:
      kubeconfig: /etc/rancher/k3s/k3s.yaml
    kubernetes.core.helm_repository:
      kubeconfig: /etc/rancher/k3s/k3s.yaml
    kubernetes.core.k8s_info:
      kubeconfig: /etc/rancher/k3s/k3s.yaml
    kubernetes.core.k8s_exec:
      kubeconfig: /etc/rancher/k3s/k3s.yaml

  roles:
    - role: gatus
      tags: ['gatus']
