experimental_monorepo_root = true

[monorepo]
config_roots = [
    "infrastructure/*",
    "platform/*",
    "platform/charts/*",
    "services/*",
    "services/*/ansible",
]

[env]
MISE_EXPERIMENTAL = 1
# Shared secrets - layer-specific secrets are in their respective mise.toml files
HCLOUD_TOKEN = "op://Private/quacttvsaylcxc3lhcvta7l2oy/password"
KUBECONFIG = "{{ config_root }}/kubeconfig"
TF_VAR_cloudflare_api_token = "op://Private/Anchor Cloudflare Config/credential"
TF_VAR_cloudflare_zone_id = "op://Private/Anchor Cloudflare Config/zone_id"
TF_VAR_domain = "op://Private/Anchor Cloudflare Config/domain"
TF_VAR_server_type = "cx33"
DOMAIN = "{{ env.TF_VAR_domain }}"
ANSIBLE_FORCE_COLOR = "1"

[tools]
"opentofu" = "latest"
"pre-commit" = "3.8.0"
"pipx" = "latest"
"uv" = "latest"
"pipx:ansible-core" = { version = "latest", uvx_args = "--with requests --with hcloud" }
"pipx:ansible-lint" = "latest"
"kubectl" = "latest"
"yamllint" = "latest"
"hcloud" = "latest"
"helm" = "3.14.4"
"helm-diff" = "latest"
"kubeconform" = "latest"
"kube-linter" = "latest"
"yq" = "latest"

[tasks.setup]
description = "Setup project dependencies and initialize"
run = [
  "mise install",
  "mise run //infrastructure/tofu:init",
  "mise run //platform/ansible:init",
]

[tasks.check]
description = "Run all validation checks across the project"
run = [
  "yamllint -c .yamllint.yaml infrastructure/ platform/ services/",
  "mise run //infrastructure/tofu:check",
  "mise run //platform/ansible:lint",
  "mise run //platform/charts/cert-manager:check",
  "mise run //platform/charts/step-ca:check",
  "mise run //services/database/ansible:lint",
  "mise run //services/identity/ansible:lint",
  "mise run //services/ntfy/ansible:lint",
  "mise run //services/gatus/ansible:lint",
  "mise run //services/developer-tooling/ansible:lint",
]

[tasks.fmt]
description = "Auto-format all project files"
run = [
  "mise run //infrastructure/tofu:fmt"
]

[tasks.deploy]
description = "Deploy full stack: infrastructure + K3s + platform + services"
run = '''
op run -- bash -c '
  set -e
  echo "==> Clearing Ansible fact cache..."
  rm -rf /tmp/ansible_facts

  echo "==> Deploying infrastructure with OpenTofu..."
  mise run //infrastructure/tofu:apply -auto-approve

  echo "==> Deploying K3s cluster + Hetzner integrations..."
  mise run //platform/ansible:deploy

  echo "==> Deploying cert-manager..."
  mise run //platform/charts/cert-manager:apply

  echo "==> Deploying step-ca..."
  mise run //platform/charts/step-ca:apply

  echo "==> Deploying services..."
  mise run //services/database:deploy
  mise run //services/identity:deploy
  mise run //services/ntfy:deploy
  mise run //services/gatus:deploy
  mise run //services/developer-tooling:deploy

  echo "==> Full stack deployment complete!"
'
'''

[tasks.ssh]
description = "SSH into a K3s node"
usage = 'arg "index" default="0" help="Node index (0, 1, or 2)"'
run = '''
#!/bin/bash
INDEX={{arg(name="index")}}
IP=$(mise run -q //infrastructure/tofu:output:json | jq -r ".node_public_ips.value[$INDEX]")
exec ssh "root@$IP"
'''

[tasks."ssh:k3s"]
description = "SSH into K3s node (alias for ssh)"
usage = 'arg "index" default="0"'
run = "mise run ssh {{arg(name='index')}}"

[tasks."k:all"]
description = "List all namespaced Kubernetes resources"
usage = 'arg "[namespace]" help="Namespace to query (default: all namespaces)"'
run = '''
#!/bin/bash
NS="{{arg(name="namespace")}}"
RESOURCES=$(kubectl api-resources --verbs=list --namespaced -o name | paste -sd "," -)
if [[ -n "$NS" ]]; then
  kubectl get "$RESOURCES" -n "$NS" --ignore-not-found
else
  kubectl get "$RESOURCES" -A --ignore-not-found
fi
'''
