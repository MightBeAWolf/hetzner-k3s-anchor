[env]
K3S_TOKEN = "op://Private/Anchor-K3s-Cluster/credential"
K3S_ETCD_SECRET = "op://Private/Anchor-K3s-Cluster/etcd_secret"
OP_CONNECT_JWT = "op://Anchor Kubernetes/Anchor 1Password Connect Server Credentials File/1password-credentials.json"
OP_OPERATOR_TOKEN = "op://Anchor Kubernetes/Anchor 1Password Token Kubernetes Operator/credential"
ANSIBLE_CONFIG = "{{ config_root }}/ansible.cfg"

[tasks.init]
description = "Install Ansible Galaxy collections"
sources = ["requirements.yml"]
run = "ansible-galaxy collection install -r requirements.yml"

[tasks.deploy]
description = "Deploy K3s cluster with Hetzner integrations"
depends = ["init"]
run = "op run -- ansible-playbook playbooks/main.yml"

[tasks."deploy:cluster"]
description = "Deploy K3s HA cluster only"
depends = ["init"]
run = "op run -- ansible-playbook playbooks/k3s-cluster.yml"

[tasks.ping]
description = "Test connectivity"
run = "op run -- ansible-playbook playbooks/ping.yml"

[tasks.inventory]
description = "List Ansible inventory from Hetzner Cloud"
run = "op run -- ansible-inventory --list"

[tasks."update-known-hosts"]
description = "Update SSH known_hosts with current server fingerprints"
run = "op run -- ansible-playbook playbooks/update-known-hosts.yml"

[tasks.uninstall]
description = "Uninstall K3s from all nodes"
run = "op run -- ansible-playbook playbooks/uninstall-k3s.yml"

[tasks."clear-cache"]
description = "Clear cached Ansible facts"
run = "rm -rf /tmp/ansible_facts"

[tasks.lint]
description = "Lint Ansible playbooks"
run = "ansible-lint"
