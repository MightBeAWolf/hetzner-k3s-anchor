[env]
CERT_MANAGER_EMAIL = "op://Private/Anchor Cloudflare Config/email"
CLOUDFLARE_API_TOKEN = "op://Private/Anchor Cloudflare Config/credential"

[tasks.apply]
description = "Deploy cert-manager with Let's Encrypt"
run = '''
#!/bin/bash
set -e

echo "==> Installing cert-manager CRD chart..."
helm upgrade --install cert-manager-crd ./crd --wait

echo "==> Waiting for cert-manager namespace..."
for i in {1..30}; do
  kubectl get ns cert-manager && break || sleep 10
done

echo "==> Waiting for cert-manager webhook to be ready..."
kubectl rollout status deployment/cert-manager-webhook -n cert-manager --timeout=300s

echo "==> Installing cert-manager config chart..."
op run -- bash -c 'helm upgrade --install cert-manager-config ./config \
  --set email="$CERT_MANAGER_EMAIL" \
  --set domain="$DOMAIN" \
  --set cloudflareApiToken="$CLOUDFLARE_API_TOKEN" \
  --set issuer=production'

echo "==> cert-manager deployment complete!"
'''

[tasks.status]
description = "Check cert-manager status"
run = '''
#!/bin/bash
echo "==> cert-manager pods:"
kubectl get pods -n cert-manager
echo ""
echo "==> ClusterIssuers:"
kubectl get clusterissuers
echo ""
echo "==> Certificates:"
kubectl get certificates -A
'''

[tasks.uninstall]
description = "Remove cert-manager"
run = '''
#!/bin/bash
helm uninstall cert-manager-config 2>/dev/null || true
helm uninstall cert-manager-crd 2>/dev/null || true
kubectl delete ns cert-manager 2>/dev/null || true
echo "cert-manager uninstalled"
'''

[tasks.check]
description = "Lint and validate Helm charts"
run = [
  "helm lint ./crd",
  "helm lint ./config",
]
