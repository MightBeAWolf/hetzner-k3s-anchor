---
# CA Password - used to decrypt intermediate CA private key
# Type required by step-certificates chart
apiVersion: v1
kind: Secret
metadata:
  name: step-ca-ca-password
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
type: smallstep.com/ca-password
stringData:
  password: {{ .Values.secrets.caPassword | quote }}
---
# Provisioner Password - used for JWK provisioner authentication
apiVersion: v1
kind: Secret
metadata:
  name: step-ca-provisioner-password
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.secrets.provisionerPassword | quote }}
---
# Certificates - public CA certificates
apiVersion: v1
kind: Secret
metadata:
  name: step-ca-certs
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
type: Opaque
stringData:
  root_ca.crt: |
{{ .Values.secrets.rootCaCrt | indent 4 }}
  intermediate_ca.crt: |
{{ .Values.secrets.intermediateCaCrt | indent 4 }}
---
# Config - step-ca configuration files
apiVersion: v1
kind: Secret
metadata:
  name: step-ca-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
type: Opaque
stringData:
  ca.json: |
{{ .Values.secrets.caJson | indent 4 }}
  defaults.json: |
{{ .Values.secrets.defaultsJson | default "{}" | indent 4 }}
---
# Private Keys - encrypted CA private keys
apiVersion: v1
kind: Secret
metadata:
  name: step-ca-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
type: smallstep.com/private-keys
stringData:
  intermediate_ca_key: |
{{ .Values.secrets.intermediateCaKey | indent 4 }}
  ssh_host_ca_key: |
{{ .Values.secrets.sshHostCaKey | indent 4 }}
  ssh_user_ca_key: |
{{ .Values.secrets.sshUserCaKey | indent 4 }}
